# .github/workflows/check-change.yml
name: check-change
on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다 (타임존 무관)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: ev-watch-state      # 상태 커밋 충돌 방지(보고서와 공유)
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Cache Playwright 브라우저
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - run: uv sync
      # --with-deps 생략: ubuntu-24 이미지에 chromium용 OS 라이브러리가 이미 있음(실험)
      - run: uv run playwright install chromium
      - run: uv run python check.py --mode change
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit state if changed
        if: always()
        run: |
          if ! git diff --quiet -- state/; then
            git config user.name "ev-watch-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state/
            git commit -m "chore: update state [skip ci]"
            git push
          fi
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: debug-artifacts
          path: artifacts/
          if-no-files-found: ignore
